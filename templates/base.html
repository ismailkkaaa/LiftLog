<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f8fafc">
    <title>{{ page_title }}</title>
    <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/logo.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.tailwind = window.tailwind || {};
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        lift: {
                            bg: '#f8fafc',
                            card: '#ffffff',
                            primary: '#06b6d4',
                            text: '#0f172a',
                            muted: '#64748b',
                            success: '#22c55e',
                        }
                    },
                    boxShadow: {
                        soft: '0 18px 40px rgba(15, 23, 42, 0.08)',
                        float: '0 14px 30px rgba(6, 182, 212, 0.18)',
                    },
                    keyframes: {
                        rise: {
                            '0%': { opacity: 0, transform: 'translateY(18px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        },
                        pulseGlow: {
                            '0%,100%': { boxShadow: '0 0 0 rgba(6,182,212,0)' },
                            '50%': { boxShadow: '0 0 0 10px rgba(6,182,212,0.08)' },
                        }
                    },
                    animation: {
                        rise: 'rise .45s ease-out',
                        pulseGlow: 'pulseGlow 1.6s ease-in-out infinite',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="bg-lift-bg text-lift-text font-sans antialiased">
    <div class="app-shell mx-auto min-h-screen max-w-md bg-gradient-to-b from-cyan-50/60 via-lift-bg to-lift-bg">
        <main class="app-main min-h-screen px-4 pb-28 pt-5" data-page="{{ active_page }}">
            {% block content %}{% endblock %}
        </main>
        {% if active_page != 'login' %}
        <nav class="fixed bottom-0 left-0 right-0 z-40 mx-auto max-w-md border-t border-slate-200/80 bg-white/95 px-3 pb-[calc(1rem+env(safe-area-inset-bottom))] pt-3 backdrop-blur">
            <div class="grid grid-cols-5 gap-2">
                <a href="/dashboard" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
                    <span>Home</span>
                </a>
                <a href="/workout-creator" class="nav-link {% if active_page == 'workout_creator' %}active{% endif %}">
                    <span>Plan</span>
                </a>
                <a href="/live-workout" class="nav-link {% if active_page == 'live_workout' %}active{% endif %}">
                    <span>Lift</span>
                </a>
                <a href="/progress" class="nav-link {% if active_page == 'progress' %}active{% endif %}">
                    <span>Stats</span>
                </a>
                <a href="/profile" class="nav-link {% if active_page == 'profile' %}active{% endif %}">
                    <span>Profile</span>
                </a>
            </div>
        </nav>
        {% endif %}
    </div>
    <div id="toast-root" class="pointer-events-none fixed inset-x-0 top-4 z-50 mx-auto flex max-w-md flex-col gap-2 px-4"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/pwa.js') }}"></script>
</body>
</html>
