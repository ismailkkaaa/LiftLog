{% extends "base.html" %}
{% block content %}
<section class="space-y-5 animate-rise">
    <header>
        <p class="text-sm font-medium text-slate-500">Profile & History</p>
        <h1 class="mt-1 text-3xl font-extrabold text-slate-900">Your training profile</h1>
    </header>

    <section class="panel">
        <form id="profile-form" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <label class="field col-span-2">
                    <span>Name</span>
                    <input name="name" type="text" placeholder="Ava" required>
                </label>
                <label class="field">
                    <span>Age</span>
                    <input name="age" type="number">
                </label>
                <label class="field">
                    <span>Height (cm)</span>
                    <input name="height" type="number">
                </label>
                <label class="field">
                    <span>Weight (kg)</span>
                    <input name="weight" type="number" step="0.1">
                </label>
                <label class="field">
                    <span>Goal</span>
                    <select name="goal">
                        <option value="Build strength">Build strength</option>
                        <option value="Gain muscle">Gain muscle</option>
                        <option value="Lose fat">Lose fat</option>
                        <option value="Stay consistent">Stay consistent</option>
                    </select>
                </label>
            </div>
            <button type="submit" class="primary-button w-full">Save profile</button>
        </form>
    </section>

    <section class="panel">
        <div class="mb-4 flex items-center justify-between">
            <div>
                <h2 class="text-xl font-bold text-slate-900">Workout history</h2>
                <p class="text-sm text-slate-500">Previous sessions, weights, and set results.</p>
            </div>
        </div>
        <div id="history-list" class="space-y-4"></div>
    </section>

    <section class="panel">
        <div class="mb-4 flex items-center justify-between">
            <div>
                <h2 class="text-xl font-bold text-slate-900">Personal records</h2>
                <p class="text-sm text-slate-500">Highest weight and most reps per exercise.</p>
            </div>
        </div>
        <div id="pr-list" class="space-y-3"></div>
    </section>
</section>
{% endblock %}
